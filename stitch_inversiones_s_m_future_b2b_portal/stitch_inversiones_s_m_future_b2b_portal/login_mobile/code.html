<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inversiones S&amp;M - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#001f2e",
                    "surface-container-low": "#111828",
                    "on-secondary-container": "#c0d8e8",
                    "on-primary-fixed-variant": "#004d73",
                    "secondary-fixed": "#c0d8e8",
                    "inverse-primary": "#0a4c6e",
                    "background": "#0a0e1a",
                    "on-tertiary-fixed": "#1a002e",
                    "on-secondary-fixed": "#0d1f2b",
                    "on-primary-container": "#c8eaff",
                    "tertiary-fixed": "#e8d0ff",
                    "error-container": "#3d1414",
                    "surface-variant": "#1a2438",
                    "inverse-on-surface": "#0a0e1a",
                    "surface-container": "#141c2e",
                    "on-tertiary": "#1a002e",
                    "surface-dim": "#0f1524",
                    "outline": "#4a6070",
                    "surface-container-highest": "#202c42",
                    "primary-fixed": "#c8eaff",
                    "primary": "#7dd3fc",
                    "tertiary": "#c8a0f0",
                    "secondary": "#88b4cc",
                    "on-secondary": "#001f2e",
                    "tertiary-fixed-dim": "#c8a0f0",
                    "on-tertiary-container": "#e8d0ff",
                    "secondary-container": "#1a3a4e",
                    "inverse-surface": "#e0e8f0",
                    "surface-tint": "#7dd3fc",
                    "on-error": "#1a0000",
                    "surface-container-high": "#1a2438",
                    "on-surface": "#e0e8f0",
                    "surface-bright": "#1a2438",
                    "on-surface-variant": "#a0b4c4",
                    "surface-container-lowest": "#0a0e1a",
                    "on-error-container": "#ffb3b3",
                    "tertiary-container": "#3d2060",
                    "surface": "#0f1524",
                    "outline-variant": "#2a3a48",
                    "on-secondary-fixed-variant": "#2a4a5e",
                    "on-background": "#e0e8f0",
                    "on-primary-fixed": "#001f2e",
                    "on-tertiary-fixed-variant": "#4d2a73",
                    "primary-container": "#0e4d6e",
                    "error": "#ff6b6b",
                    "primary-fixed-dim": "#7dd3fc",
                    "secondary-fixed-dim": "#88b4cc"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "display": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a;
        }
        .glass-card {
            background: rgba(15, 21, 36, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 211, 252, 0.1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(125, 211, 252, 0.15);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(125, 211, 252, 0.05);
            border-color: #7dd3fc;
            box-shadow: 0 0 15px rgba(125, 211, 252, 0.1);
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="text-on-surface antialiased overflow-hidden">
<!-- Background Hero Image with DataStore Placeholder -->
<div class="fixed inset-0 z-0">
<img alt="Futuristic supercar in a high-tech laboratory environment" class="w-full h-full object-cover brightness-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaL6XeMQStKTJxDlhCOjGqoGMwvJT6U1KfH5RE0KLzUiqi4qIhnVOeeRHqFrwsbtDKoAJFH63nfrWvb4eytdT3nNf6SloKX0zeFAt4r7ZtVT2-ktsOJqFM3rNTsZUIso1pJC6YoBoHDDQDbbS0grFC0ooc3S8ojz9pNkzJFvEyX1M2LeKKn5O_5Vmj2A5AUE1C1BngBkr5mV7CW0h9RnwRHGr0DyWDca4_71qt9AxzKTuyEttprRtaN1MRRVP-QZPr2AcIu84YYvY"/>
<!-- Radial Gradient Overlay for Depth -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-80"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-transparent via-background/40 to-background opacity-90"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex min-h-screen flex-col items-center justify-center p-6">
<!-- Header Branding (Suppressed Shell - Content from JSON) -->
<header class="mb-12 text-center">
<h1 class="text-4xl font-black text-primary tracking-widest drop-shadow-[0_0_15px_rgba(125,211,252,0.4)] mb-2">
                Inversiones S&amp;M
            </h1>
<p class="text-on-surface-variant/80 font-medium tracking-tight uppercase text-sm">
                Premium Automotive Parts • Portal B2B
            </p>
</header>
<!-- Centered Glass Login Card -->
<div class="w-full max-w-sm glass-card rounded-xl p-8 shadow-2xl shadow-background/80 relative overflow-hidden group">
<!-- Subtle luminous corner glow -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 blur-[60px]"></div>
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-tertiary/10 blur-[60px]"></div>
<div class="relative z-10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-on-surface">Iniciar Sesión</h2>
<p class="text-on-surface-variant text-sm mt-1">Accede a tu cuenta corporativa</p>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Usuario / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">
                                person
                            </span>
<input class="w-full glass-input rounded-lg pl-12 pr-4 py-4 text-on-surface placeholder:text-on-surface-variant/30" placeholder="nombre@empresa.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Contraseña</label>
<a class="text-[10px] uppercase font-bold text-primary/70 hover:text-primary transition-colors" href="#">¿Olvidaste?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">
                                lock
                            </span>
<input class="w-full glass-input rounded-lg pl-12 pr-4 py-4 text-on-surface placeholder:text-on-surface-variant/30" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3 px-1">
<div class="relative flex items-center">
<input class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary focus:ring-primary/20 focus:ring-offset-0" id="remember" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant font-medium select-none" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Login Button -->
<button class="group/btn relative w-full overflow-hidden rounded-lg bg-primary/10 border border-primary/30 py-4 font-bold text-primary transition-all hover:bg-primary/20 active:scale-95 duration-200">
<span class="relative z-10 flex items-center justify-center gap-2">
                            Ingresar al Portal
                            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover/btn:animate-[shimmer_2s_infinite] pointer-events-none"></div>
</button>
</form>
<!-- Biometric Login Suggestion -->
<div class="mt-8 pt-6 border-t border-white/5 flex flex-col items-center gap-4">
<p class="text-[10px] uppercase font-black text-on-surface-variant/40 tracking-[0.2em]">O accede con</p>
<div class="flex gap-4">
<button class="w-12 h-12 rounded-full glass-input flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">fingerprint</span>
</button>
<button class="w-12 h-12 rounded-full glass-input flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">face</span>
</button>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<footer class="mt-8 text-center">
<p class="text-on-surface-variant/60 text-sm">
                ¿No tienes una cuenta de distribuidor?
            </p>
<a class="mt-1 inline-block text-primary font-bold hover:underline transition-all" href="#">
                Solicitar Registro B2B
            </a>
</footer>
<!-- Bottom Decoration -->
<div class="mt-12 opacity-30 flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.3em] text-on-surface-variant">
<span>Security</span>
<div class="w-1 h-1 rounded-full bg-primary"></div>
<span>Encrypted</span>
<div class="w-1 h-1 rounded-full bg-primary"></div>
<span>v2.4.0</span>
</div>
</main>
<!-- Visual Floating Particles (Pure CSS) -->
<div class="pointer-events-none fixed inset-0 z-1 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10"></div>
<style>
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</body></html>
